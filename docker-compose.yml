services:
  neo4j:
    image: neo4j:5.26-community
    container_name: scientific-knot-neo4j
    ports:
      - "17474:7474"
      - "17687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16
    container_name: scientific-knot-postgres
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: scientific_knot
      POSTGRES_USER: sk_user
      POSTGRES_PASSWORD: sk_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sk_user -d scientific_knot"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    container_name: scientific-knot-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: docker
      USE_MOCK_ML: "${USE_MOCK_ML:-false}"
      MOCK_EXTRACTED_DOCUMENT_PATH: /app/mock/mock_extracted_document.json
      STORAGE_DIR: /app/storage
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: scientific_knot
      POSTGRES_USER: sk_user
      POSTGRES_PASSWORD: sk_password
      ML_SERVICE_URL: http://ml-service:9000
      EXPOSE_DEBUG: "false"
    volumes:
      - ./mock:/app/mock:ro
      - ./storage:/app/storage
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12

  ml-service:
    build:
      context: ./ml-service
      args:
        INSTALL_DENSE: "${INSTALL_DENSE_ML:-1}"
    container_name: scientific-knot-ml
    restart: unless-stopped
    ports:
      - "9000:9000"

    # Final Windows/NVIDIA deployment: GPU is requested directly here so
    # plain `docker compose up -d --build` is sufficient.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu

    environment:
      LLM_PROVIDER: "${LLM_PROVIDER:-yandex}"
      YANDEX_API_KEY: "${YANDEX_API_KEY:-}"
      YANDEX_FOLDER_ID: "${YANDEX_FOLDER_ID:-}"
      YANDEX_MODEL: "${YANDEX_MODEL:-yandexgpt-5-lite}"

      OPENAI_COMPATIBLE_BASE_URL: "${OPENAI_COMPATIBLE_BASE_URL:-http://host.docker.internal:11434/v1}"
      OPENAI_COMPATIBLE_API_KEY: "${OPENAI_COMPATIBLE_API_KEY:-local}"
      OPENAI_COMPATIBLE_MODEL: "${OPENAI_COMPATIBLE_MODEL:-gpt-oss:20b}"

      RETRIEVAL_INDEX_DIR: /data/retrieval-index
      DENSE_ENABLED: "${DENSE_ENABLED:-true}"
      LEXICAL_ENABLED: "${LEXICAL_ENABLED:-true}"

      # Explicit defaults ensure missing weights are downloaded during warmup.
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}"
      RERANKER_MODEL: "${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}"

      RETRIEVAL_DENSE_K: "${RETRIEVAL_DENSE_K:-200}"
      RETRIEVAL_LEXICAL_K: "${RETRIEVAL_LEXICAL_K:-200}"
      RETRIEVAL_RRF_K: "${RETRIEVAL_RRF_K:-60}"
      RETRIEVAL_RERANK_POOL: "${RETRIEVAL_RERANK_POOL:-50}"

      RERANKER_BATCH_SIZE: "${RERANKER_BATCH_SIZE:-4}"
      RERANKER_MAX_LENGTH: "${RERANKER_MAX_LENGTH:-512}"

      QUERY_LLM_TIMEOUT_SECONDS: "${QUERY_LLM_TIMEOUT_SECONDS:-12}"
      QUERY_LLM_MAX_ATTEMPTS: "${QUERY_LLM_MAX_ATTEMPTS:-1}"
      QUERY_DETERMINISTIC_FAST_SCORE: "${QUERY_DETERMINISTIC_FAST_SCORE:-4}"

      HF_HOME: /root/.cache/huggingface
      SENTENCE_TRANSFORMERS_HOME: /root/.cache/huggingface/sentence_transformers

      AUTO_IMPORT_GRAPH_PATH: /data/input/demo_extracted_documents_fixed.jsonl
      AUTO_IMPORT_TIMEOUT_SECONDS: "${AUTO_IMPORT_TIMEOUT_SECONDS:-180}"

      # Startup warmup may include first-time model downloads.
      ML_WARMUP_TIMEOUT_SECONDS: "${ML_WARMUP_TIMEOUT_SECONDS:-1800}"
      STARTUP_WAIT_SECONDS: "${STARTUP_WAIT_SECONDS:-300}"

    volumes:
      - ./ml-data:/data
      - ./.hf-cache:/root/.cache/huggingface

    depends_on:
      backend:
        condition: service_healthy

    # No external entrypoint script:
    # 1) start the real Uvicorn process;
    # 2) wait for local ML HTTP and backend;
    # 3) import graph payload and warm retrieval models in parallel;
    # 4) validate actual dense/reranker scores;
    # 5) expose readiness marker only after everything succeeds.
    command:
      - /bin/sh
      - -ec
      - |
        rm -f /tmp/ml-ready /tmp/ml-warmup.json /tmp/graph-import.log

        UVICORN_PID=""
        IMPORT_PID=""

        cleanup() {
          rm -f /tmp/ml-ready
          if [ -n "$$IMPORT_PID" ]; then
            kill -TERM "$$IMPORT_PID" 2>/dev/null || true
          fi
          if [ -n "$$UVICORN_PID" ]; then
            kill -TERM "$$UVICORN_PID" 2>/dev/null || true
          fi
        }

        fail() {
          echo "[startup] ERROR: $$*" >&2
          cleanup
          exit 1
        }

        trap 'cleanup; exit 143' INT TERM

        echo "[startup] starting ml-service"
        uvicorn app.main:app --host 0.0.0.0 --port 9000 &
        UVICORN_PID=$$!

        WAITED=0
        until curl -fsS --connect-timeout 3 --max-time 5 \
          http://127.0.0.1:9000/health >/dev/null 2>&1; do
          kill -0 "$$UVICORN_PID" 2>/dev/null \
            || fail "uvicorn exited before local health became ready"
          [ "$$WAITED" -lt "$${STARTUP_WAIT_SECONDS}" ] \
            || fail "timeout waiting for local ml-service"
          sleep 2
          WAITED=$$((WAITED + 2))
        done
        echo "[startup] local ml-service HTTP is reachable"

        WAITED=0
        until curl -fsS --connect-timeout 3 --max-time 5 \
          http://backend:8000/health >/dev/null 2>&1; do
          kill -0 "$$UVICORN_PID" 2>/dev/null \
            || fail "uvicorn exited while waiting for backend"
          [ "$$WAITED" -lt "$${STARTUP_WAIT_SECONDS}" ] \
            || fail "timeout waiting for backend"
          sleep 2
          WAITED=$$((WAITED + 2))
        done
        echo "[startup] backend is reachable"

        IMPORT_PATH="$${AUTO_IMPORT_GRAPH_PATH}"

        [ -f "$$IMPORT_PATH" ] \
          || fail "required graph import file missing: $$IMPORT_PATH"

        echo "[startup] starting graph import"
        python scripts/import_extracted_jsonl.py \
          "$$IMPORT_PATH" \
          --backend-url http://backend:8000 \
          --user-id ml_importer \
          --role admin \
          --token admin-token \
          --timeout "$${AUTO_IMPORT_TIMEOUT_SECONDS}" \
          >/tmp/graph-import.log 2>&1 &
        IMPORT_PID=$$!

        echo "[startup] warming dense embedding + reranker models"
        echo "[startup] missing Hugging Face weights will download into persistent .hf-cache"

        curl -fsS \
          --connect-timeout 10 \
          --max-time "$${ML_WARMUP_TIMEOUT_SECONDS}" \
          -X POST http://127.0.0.1:9000/ml/retrieve \
          -H 'Content-Type: application/json; charset=utf-8' \
          --data-binary '{
            "query": "Какие эксперты и лаборатории занимаются автоклавным выщелачиванием?",
            "top_k": 3,
            "visible_access_levels": ["public", "internal", "confidential"]
          }' \
          >/tmp/ml-warmup.json \
          || fail "retrieval model warmup request failed"

        python -c 'import json,os; d=json.load(open("/tmp/ml-warmup.json", encoding="utf-8")); hits=d.get("hits") or []; warnings=" | ".join(map(str,d.get("warnings") or [])); dense=os.getenv("DENSE_ENABLED","true").lower() in {"1","true","yes","on"}; reranker=os.getenv("RERANKER_MODEL","").strip(); assert hits, "warmup returned zero hits"; assert (not dense) or ("Dense retrieval unavailable" not in warnings), "dense branch unavailable: "+warnings; assert (not reranker) or ("Reranker failed" not in warnings), "reranker inference failed: "+warnings; assert (not reranker) or any(isinstance(h,dict) and h.get("reranker_score") is not None for h in hits), "reranker produced no scored warmup hits"; print("[startup] warmup validation OK: hits=%d warnings=%d" % (len(hits), len(d.get("warnings") or [])))' \
          || fail "warmup response validation failed"

        echo "[startup] retrieval models are loaded and warm"

        if ! wait "$$IMPORT_PID"; then
          cat /tmp/graph-import.log >&2 || true
          IMPORT_PID=""
          fail "graph import command failed"
        fi
        IMPORT_PID=""

        cat /tmp/graph-import.log

        grep -Eq '^Failed:[[:space:]]+0[[:space:]]*$$' \
          /tmp/graph-import.log \
          || fail "graph import reported failed documents"

        echo "[startup] graph import finished successfully"

        touch /tmp/ml-ready
        echo "[startup] READY: import complete; dense and reranker warm"

        wait "$$UVICORN_PID"

    healthcheck:
      test:
        - CMD-SHELL
        - test -f /tmp/ml-ready && curl -fsS http://localhost:9000/health >/dev/null || exit 1
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 180

  frontend:
    build: ./frontend
    container_name: scientific-knot-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
      ml-service:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
